[build]
  command = "pnpm prisma generate && echo \"export * from './client'\" > src/generated/prisma/index.ts && pnpm run build"
  publish = ".next"

[functions]
  node_bundler = "nft"

[functions."api/agent/rules"]
  timeout = 120

[functions."api/agent/ask"]
  timeout = 120

[functions."api/agent/analyze"]
  timeout = 60

[functions."api/bank-agent/connect"]
  timeout = 120

[functions."api/bank-agent/sync"]
  timeout = 120

[functions."api/rent/generate"]
  timeout = 60

[[plugins]]
  package = "@netlify/plugin-nextjs"
