[build]
  command = "pnpm prisma generate && pnpm run build"
  publish = ".next"

[functions]
  node_bundler = "nft"

[functions."api/setup/business-type"]
  timeout = 30

[functions."api/agent/rules"]
  timeout = 60

[functions."api/agent/ask"]
  timeout = 60

[functions."api/agent/analyze"]
  timeout = 60

[[plugins]]
  package = "@netlify/plugin-nextjs"
