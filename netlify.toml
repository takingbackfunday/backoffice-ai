[build]
  command = "pnpm prisma generate && pnpm prisma db push --accept-data-loss && pnpm run build"
  publish = ".next"

[functions]
  node_bundler = "nft"

[functions."api/agent/rules"]
  timeout = 120

[functions."api/agent/ask"]
  timeout = 60

[functions."api/agent/analyze"]
  timeout = 60

[functions."api/bank-agent/connect"]
  timeout = 120

[functions."api/bank-agent/sync"]
  timeout = 120

[[plugins]]
  package = "@netlify/plugin-nextjs"
