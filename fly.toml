# fly.toml app configuration file generated for backoffice-ai on 2026-04-14T16:37:06+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backoffice-ai'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    NEXT_PUBLIC_APP_URL = 'https://backoffice.cv'
    NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL = '/dashboard'
    NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL = '/dashboard'
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = 'pk_live_Y2xlcmsuYmFja29mZmljZS5jdiQ'
    NEXT_PUBLIC_CLERK_SIGN_IN_URL = '/sign-in'
    NEXT_PUBLIC_CLERK_SIGN_UP_URL = '/sign-up'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
